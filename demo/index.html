<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Giza switchback STL demo</title>
    <meta
      name="description"
      content="Animated STL viewer for a printable Giza pyramid construction-theory kit with layer-built ramps, capstone placement, and top-down deramping."
    />
    <link rel="canonical" href="https://danieliser.github.io/giza-pyramid-kit/demo/" />
    <meta property="og:site_name" content="Giza Pyramid Kit" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://danieliser.github.io/giza-pyramid-kit/demo/" />
    <meta property="og:title" content="Giza Pyramid Construction Theory STL Demo" />
    <meta
      property="og:description"
      content="A browser demo and printable STL kit showing a layer-built inner mound, switchback ramps, capstone placement, and top-down deramping sequence."
    />
    <meta
      property="og:image"
      content="https://danieliser.github.io/giza-pyramid-kit/release/thingiverse/images/capstone_before_deramping.png"
    />
    <meta
      property="og:image:secure_url"
      content="https://danieliser.github.io/giza-pyramid-kit/release/thingiverse/images/capstone_before_deramping.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1600" />
    <meta property="og:image:height" content="1000" />
    <meta
      property="og:image:alt"
      content="Rendered Giza pyramid construction model with capstone set before top-down deramping."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Giza Pyramid Construction Theory STL Demo" />
    <meta
      name="twitter:description"
      content="Animated STL viewer for a printable pyramid build-and-deramp model."
    />
    <meta
      name="twitter:image"
      content="https://danieliser.github.io/giza-pyramid-kit/release/thingiverse/images/capstone_before_deramping.png"
    />
    <meta
      name="twitter:image:alt"
      content="Rendered Giza pyramid construction model with capstone set before top-down deramping."
    />
    <link
      rel="alternate"
      type="application/json+oembed"
      href="https://danieliser.github.io/giza-pyramid-kit/demo/oembed.json"
      title="Giza Pyramid Kit oEmbed"
    />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app">
      <section id="viewport" aria-label="Animated STL assembly viewer"></section>
      <a
        class="github-corner"
        href="https://github.com/danieliser/giza-pyramid-kit"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Open the giza-pyramid-kit GitHub repository"
      >
        <span class="github-corner__content">
          <span class="github-corner__title">GitHub</span>
          <span class="github-corner__subtitle">Source + STLs</span>
        </span>
      </a>
      <aside class="panel" aria-label="Timeline controls">
        <div class="panel-heading">
          <div class="panel-copy">
          <div class="panel-kicker">
            <p class="label">Giza construction sequence</p>
          </div>
          <h1 id="stage-title">Loading STL parts</h1>
          </div>
          <div class="transport" aria-label="Playback controls">
            <button id="play" type="button">Pause</button>
            <button id="reset" type="button">Reset</button>
          </div>
        </div>
        <p id="stage-note" class="note">Preparing the assembly-coordinate meshes.</p>
        <div class="timeline-control">
          <label class="range-label" for="timeline">Timeline</label>
          <input id="timeline" type="range" min="0" max="1000" value="0" />
        </div>
        <details id="display-controls" class="display-controls" open>
          <summary>Display controls</summary>
          <div class="display-controls__body">
            <div class="opacity-controls">
              <label class="range-label value-label" for="structure-opacity">
                <span>Pyramid opacity</span>
                <output id="structure-opacity-value" for="structure-opacity">100%</output>
              </label>
              <input id="structure-opacity" type="range" min="0" max="100" value="100" />
              <label class="range-label value-label" for="chamber-opacity">
                <span>Chamber opacity</span>
                <output id="chamber-opacity-value" for="chamber-opacity">100%</output>
              </label>
              <input id="chamber-opacity" type="range" min="0" max="100" value="100" />
            </div>
            <div class="toggles" aria-label="Layer toggles">
              <label><input id="toggle-core" type="checkbox" checked /> Inner mound</label>
              <label><input id="toggle-mound" type="checkbox" checked /> Cut mound</label>
              <label><input id="toggle-ramps" type="checkbox" checked /> Ramps</label>
              <label><input id="toggle-casing" type="checkbox" checked /> Casing</label>
              <label><input id="toggle-chambers" type="checkbox" checked /> Chambers</label>
            </div>
          </div>
        </details>
      </aside>
      <div id="loading" role="status">Loading STL parts...</div>
    </main>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
